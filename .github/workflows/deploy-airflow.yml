name: Deploy Airflow to Cloud Run

# When does this run?
# - When you push changes to airflow/ or terraform/ on main branch
# - When you manually trigger it from GitHub Actions tab
on:
  push:
    branches: [main, vedashree, modelling]
    paths:
      - "airflow/**"
      - "terraform/**"
      - ".github/workflows/deploy-airflow.yml"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: mlops-project-488302
  GCP_REGION: us-central1
  AR_REPO: airflow-images-prod
  IMAGE_NAME: airflow

jobs:
  # ── JOB 1: Build Docker image and push to Artifact Registry ────
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Image: $IMAGE_TAG"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image_tag }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest \
            -f airflow/Dockerfile \
            airflow/

      - name: Push Docker image
        run: |
          docker push ${{ steps.meta.outputs.image_tag }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest

  # ── JOB 2: Run Terraform to create/update infrastructure ───────
  terraform:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="airflow_image_tag=${{ github.sha }}" \
            -var="db_password=${{ secrets.TF_VAR_db_password }}" \
            -var="airflow_fernet_key=${{ secrets.TF_VAR_airflow_fernet_key }}" \
            -var="airflow_jwt_secret=${{ secrets.TF_VAR_airflow_jwt_secret }}" \
            -var="mongo_uri=${{ secrets.TF_VAR_mongo_uri }}" \
            -var="github_token=${{ secrets.TF_VAR_github_token }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

  # ── JOB 3: Initialize Airflow (DB migrate + create admin) ─────
  post-deploy:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Airflow DB init job
        run: |
          gcloud run jobs execute airflow-init-prod \
            --region ${{ env.GCP_REGION }} \
            --wait

      - name: Smoke test - check webserver is up
        run: |
          WEBSERVER_URL=$(gcloud run services describe airflow-webserver-prod \
            --region ${{ env.GCP_REGION }} \
            --format="value(status.url)")
          echo "Airflow URL: $WEBSERVER_URL"
          curl -s -o /dev/null -w "%{http_code}" "$WEBSERVER_URL/api/v2/version" | grep -q "200\|401\|403"
          echo "Webserver is responding!"
