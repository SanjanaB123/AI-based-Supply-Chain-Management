name: Deploy Independent Airflow

on:
  push:
    branches: [main, rohit]
    paths:
      - "airflow/**"
      - "terraform/airflow/**"
      - "terraform/modules/**"
      - ".github/workflows/deploy-airflow.yml"
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  ENVIRONMENT: prod
  AR_REPO: airflow-images-prod
  IMAGE_NAME: airflow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set Project Infrastructure Info
        run: |
          PROJECT_ID=$(echo '${{ secrets.GCP_SA_KEY }}' | jq -r .project_id)
          echo "GCP_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Image
        run: |
          IMAGE_TAG="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_TAG -t "${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest" airflow/
          docker push $IMAGE_TAG
          docker push "${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest"

  terraform:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set Project Infrastructure Info
        run: |
          PROJECT_ID=$(echo '${{ secrets.GCP_SA_KEY }}' | jq -r .project_id)
          echo "GCP_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "TF_STATE_BUCKET=${PROJECT_ID}-tfstate" >> $GITHUB_ENV

      - name: Ensure State Bucket Exists
        run: |
          gsutil mb -p ${{ env.GCP_PROJECT_ID }} -l ${{ env.GCP_REGION }} gs://${{ env.TF_STATE_BUCKET }} || true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        working-directory: terraform/airflow
        run: |
          terraform init -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" -backend-config="prefix=airflow"

      - name: Terraform Apply (init job only)
        working-directory: terraform/airflow
        run: |
          terraform apply -auto-approve \
            -target=module.airflow_iam \
            -target=module.airflow_init \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="tfstate_bucket=${{ env.TF_STATE_BUCKET }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="airflow_image_tag=${{ github.sha }}" \
            -var="gcs_bucket_name=supply-chain-pipeline" \
            -var="github_repo=SanjanaB123/AI-based-Supply-Chain-Management" \
            -var="airflow_admin_password=${{ secrets.TF_VAR_AIRFLOW_ADMIN_PASSWORD }}"

      - name: Run Airflow DB init job
        run: |
          gcloud run jobs execute airflow-init-prod \
            --region ${{ env.GCP_REGION }} \
            --wait

      - name: Terraform Apply (webserver and scheduler)
        working-directory: terraform/airflow
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="tfstate_bucket=${{ env.TF_STATE_BUCKET }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="airflow_image_tag=${{ github.sha }}" \
            -var="gcs_bucket_name=supply-chain-pipeline" \
            -var="github_repo=SanjanaB123/AI-based-Supply-Chain-Management" \
            -var="airflow_admin_password=${{ secrets.TF_VAR_AIRFLOW_ADMIN_PASSWORD }}"
