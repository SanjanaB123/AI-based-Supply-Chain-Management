name: Deploy Airflow to Cloud Run

# When does this run?
# - When you push changes to airflow/ or terraform/ on main branch
# - When you manually trigger it from GitHub Actions tab
on:
  push:
    branches: [main, vedashree, modelling, somya]
    paths:
      - "airflow/**"
      - "terraform/**"
      - ".github/workflows/deploy-airflow.yml"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: liquid-fulcrum-489019-g1
  GCP_REGION: us-central1
  AR_REPO: airflow-images-prod
  IMAGE_NAME: airflow

jobs:
  # ── JOB 1: Terraform infra FIRST (creates Artifact Registry, VPC, DB, etc.) ──
  terraform-infra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required GCP APIs
        run: |
          for api in \
            run.googleapis.com \
            sqladmin.googleapis.com \
            artifactregistry.googleapis.com \
            secretmanager.googleapis.com \
            vpcaccess.googleapis.com \
            compute.googleapis.com \
            servicenetworking.googleapis.com \
            cloudresourcemanager.googleapis.com \
            iam.googleapis.com; do
            echo "Enabling $api..."
            gcloud services enable "$api" --project=${{ env.GCP_PROJECT_ID }} || true
          done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply - Infrastructure only
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="airflow_image_tag=${{ github.sha }}" \
            -var="db_password=${{ secrets.TF_VAR_db_password }}" \
            -var="airflow_fernet_key=${{ secrets.TF_VAR_airflow_fernet_key }}" \
            -var="airflow_jwt_secret=${{ secrets.TF_VAR_airflow_jwt_secret }}" \
            -var="mongo_uri=${{ secrets.TF_VAR_mongo_uri }}" \
            -var="github_token=${{ secrets.TF_VAR_github_token }}" \
            -var="airflow_admin_password=${{ secrets.TF_VAR_airflow_admin_password }}" \
            -target=module.networking \
            -target=module.cloud_sql \
            -target=module.artifact_registry \
            -target=module.iam \
            -target=module.secret_manager \
            -target=module.gcs

  # ── JOB 2: Build and push Docker image (Artifact Registry now exists) ──
  build-and-push:
    needs: terraform-infra
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Image: $IMAGE_TAG"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image_tag }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest \
            -f airflow/Dockerfile \
            airflow/

      - name: Push Docker image
        run: |
          docker push ${{ steps.meta.outputs.image_tag }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest

  # ── JOB 3: Deploy Cloud Run services + init DB ────────
  deploy-services:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply - Cloud Run (all resources)
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="airflow_image_tag=${{ github.sha }}" \
            -var="db_password=${{ secrets.TF_VAR_db_password }}" \
            -var="airflow_fernet_key=${{ secrets.TF_VAR_airflow_fernet_key }}" \
            -var="airflow_jwt_secret=${{ secrets.TF_VAR_airflow_jwt_secret }}" \
            -var="mongo_uri=${{ secrets.TF_VAR_mongo_uri }}" \
            -var="github_token=${{ secrets.TF_VAR_github_token }}" \
            -var="airflow_admin_password=${{ secrets.TF_VAR_airflow_admin_password }}"

      - name: Run Airflow DB init job
        run: |
          gcloud run jobs execute airflow-init-prod \
            --region ${{ env.GCP_REGION }} \
            --wait

      - name: Smoke test - check webserver is up
        run: |
          WEBSERVER_URL=$(gcloud run services describe airflow-webserver-prod \
            --region ${{ env.GCP_REGION }} \
            --format="value(status.url)")
          echo "Airflow URL: $WEBSERVER_URL"
          echo "airflow_url=$WEBSERVER_URL" >> $GITHUB_OUTPUT
          # Give services a moment to stabilize
          sleep 30
          curl -s -o /dev/null -w "%{http_code}" "$WEBSERVER_URL/api/v2/version" | grep -q "200\|401\|403"
          echo "Webserver is responding!"
