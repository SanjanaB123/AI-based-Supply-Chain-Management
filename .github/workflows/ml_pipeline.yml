name: ML Pipeline

on:
  push:
    branches: [ main, modelling ]
    paths:
      - '**.dvc'
  workflow_dispatch:

env:
  IMAGE_TAG: ml-pipeline:${{ github.sha }}
  MLFLOW_TRACKING_URI: https://mlflow-833456981899.us-central1.run.app/

jobs:
  ml_pipeline:
    runs-on: ubuntu-latest
    env:
      GCS_BUCKET: supply-chain-pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download previous Optuna studies
        uses: actions/download-artifact@v4
        with:
          name: optuna-studies
          path: .
        continue-on-error: true  # First run won't have studies to download

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r modelling/requirements.txt

      - name: Set up MLflow environment
        env:
          MLFLOW_TRACKING_URI: https://mlflow-952666479463.us-central1.run.app/
        run: |
          echo "MLflow tracking URI: $MLFLOW_TRACKING_URI"
          python -c "import mlflow; print('MLflow version:', mlflow.__version__)"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          create_credentials_file: true
          export_environment_variables: true

      - name: Build ML pipeline Docker image
        run: docker build -t $IMAGE_TAG -f modelling/Dockerfile modelling/

      - name: Create directories
        run: mkdir -p data/splits data/models/xgboost data/models/prophet reports

      - name: Debug data folder
        run: |
          echo "Contents of data/:"
          ls -lh data/
          echo "Contents of data/features/:"
          ls -lh data/features/

      - name: Pull data from DVC
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -v ${{ steps.auth.outputs.credentials_file_path }}:/workspace/.gcp-creds.json:ro \
            -e GOOGLE_APPLICATION_CREDENTIALS=/workspace/.gcp-creds.json \
            $IMAGE_TAG \
            bash -c "dvc remote modify --local storage credentialpath \$GOOGLE_APPLICATION_CREDENTIALS && dvc pull"

      - name: Split data
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            $IMAGE_TAG \
            python modelling/scripts/data_splitting.py

      - name: Tune XGBoost hyperparameters
        env:
          MLFLOW_TRACKING_URI: https://mlflow-952666479463.us-central1.run.app/
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e MLFLOW_TRACKING_URI=${{ env.MLFLOW_TRACKING_URI }} \
            $IMAGE_TAG \
            python modelling/models/optuna_tuning.py \
              --model xgboost \
              --data-dir data/splits \
              --output-dir optuna_studies \
              --xgb-trials 50

      - name: Tune Prophet hyperparameters
        env:
          MLFLOW_TRACKING_URI: https://mlflow-952666479463.us-central1.run.app/
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e MLFLOW_TRACKING_URI=${{ env.MLFLOW_TRACKING_URI }} \
            $IMAGE_TAG \
            python modelling/models/optuna_tuning.py \
              --model prophet \
              --data-dir data/splits \
              --output-dir optuna_studies \
              --prophet-trials 30

      - name: Train XGBoost model
        env:
          MLFLOW_TRACKING_URI: https://mlflow-952666479463.us-central1.run.app/
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e MLFLOW_TRACKING_URI=${{ env.MLFLOW_TRACKING_URI }} \
            $IMAGE_TAG \
            python modelling/models/xgboost_model.py \
              --data-dir data/splits \
              --output-dir data/models/xgboost \
              --reports-dir reports \
              --params-path optuna_studies/xgboost/best_params.json

      - name: Train Prophet model
        env:
          MLFLOW_TRACKING_URI: https://mlflow-952666479463.us-central1.run.app/
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e MLFLOW_TRACKING_URI=${{ env.MLFLOW_TRACKING_URI }} \
            $IMAGE_TAG \
            python modelling/models/prophet_model.py \
              --data-dir data/splits \
              --output-dir data/models/prophet \
              --reports-dir reports \
              --params-path optuna_studies/prophet/best_params.json

      - name: Select best model and promote to production
        env:
          MLFLOW_TRACKING_URI: https://mlflow-952666479463.us-central1.run.app/
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e MLFLOW_TRACKING_URI=${{ env.MLFLOW_TRACKING_URI }} \
            $IMAGE_TAG \
            python modelling/scripts/select_model.py
          if [ -f "reports/best_model.txt" ]; then
            echo "BEST_MODEL=$(cat reports/best_model.txt)" >> $GITHUB_ENV
          else
            echo "ERROR: best_model.txt not found"
            exit 1
          fi

      - name: Run bias detection
        id: bias
        continue-on-error: true
        env:
          MLFLOW_TRACKING_URI: https://mlflow-952666479463.us-central1.run.app/
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e MLFLOW_TRACKING_URI=${{ env.MLFLOW_TRACKING_URI }} \
            $IMAGE_TAG \
            python modelling/scripts/bias_detection.py \
              --model-name "$BEST_MODEL" \
              --data-dir data/splits \
              --scaler-path data/models/xgboost/scaler.pkl

      - name: Alert on bias detection issues
        if: steps.bias.outcome == 'failure'
        run: |
          echo "## Bias Detection Warning" >> $GITHUB_STEP_SUMMARY
          echo "Bias detection flagged issues for model **$BEST_MODEL**." >> $GITHUB_STEP_SUMMARY
          echo "Review the bias report in the workflow artifacts." >> $GITHUB_STEP_SUMMARY
          echo "[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Run sensitivity analysis
        env:
          MLFLOW_TRACKING_URI: https://mlflow-952666479463.us-central1.run.app/
        run: python modelling/scripts/sensitivity_analysis.py --model-name "$BEST_MODEL" --data-dir data/splits

      - name: Clean up split files
        run: rm -f data/splits/train.parquet data/splits/val.parquet data/splits/test.parquet

      - name: Upload models and reports
        uses: actions/upload-artifact@v4
        with:
          name: model-and-reports
          path: |
            data/models/
            reports/

      - name: Save Optuna studies for next run
        uses: actions/upload-artifact@v4
        with:
          name: optuna-studies
          path: |
            optuna_studies.db
            optuna_studies/
          retention-days: 90
          overwrite: true

      - name: Pipeline success summary
        if: success()
        run: |
          echo "## ML Pipeline Succeeded" >> $GITHUB_STEP_SUMMARY
          echo "**Best model:** $BEST_MODEL" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/model_comparison.json ]; then
            echo "### Model Comparison" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/model_comparison.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Pipeline failure summary
        if: failure()
        run: |
          echo "## ML Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

