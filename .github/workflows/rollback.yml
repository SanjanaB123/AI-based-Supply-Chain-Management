name: Model Rollback

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Model to roll back'
        required: true
        type: choice
        options:
          - xgboost-supply-chain
          - prophet-supply-chain
      target_version:
        description: 'Specific version to restore (leave empty for latest archived)'
        required: false
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.22.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Run rollback
        env:
          MLFLOW_TRACKING_URI: https://mlflow-952666479463.us-central1.run.app/
        run: |
          VERSION_ARG=""
          if [ -n "${{ inputs.target_version }}" ]; then
            VERSION_ARG="--target-version ${{ inputs.target_version }}"
          fi
          python modelling/scripts/rollback_model.py \
            --model-name "${{ inputs.model_name }}" \
            $VERSION_ARG

      - name: Rollback summary
        if: always()
        run: |
          echo "## Model Rollback" >> $GITHUB_STEP_SUMMARY
          echo "**Model:** ${{ inputs.model_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Target version:** ${{ inputs.target_version || 'latest archived' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
